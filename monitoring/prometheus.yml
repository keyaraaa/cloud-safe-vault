# Prometheus scrape config для Digital Security Platform.
# Flask-приложение отдаёт метрики через prometheus-flask-exporter на /metrics.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "dsp-web"
    metrics_path: /metrics
    static_configs:
      - targets: ["dsp-web:5000"]
        labels:
          app: dsp
          env: production

  - job_name: "prometheus-self"
    static_configs:
      - targets: ["localhost:9090"]
