services:
  - type: web
    name: vault
    runtime: docker
    dockerfilePath: ./Dockerfile
    branch: main
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vault-db
          property: connectionString

databases:
  - name: vault-db
    databaseName: dsp
    user: dsp
    plan: free
