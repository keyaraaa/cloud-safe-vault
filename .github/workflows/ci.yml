name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dsp
          POSTGRES_PASSWORD: dsp
          POSTGRES_DB: dsp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U dsp -d dsp_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check app tests || true   # не валим пайплайн на стиле

      - name: Run tests
        env:
          SECRET_KEY: ci-secret
          DATABASE_URL: postgresql+psycopg2://dsp:dsp@localhost:5432/dsp_test
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t dsp:ci .
      - name: Smoke-test image
        run: |
          docker run -d --name dsp-smoke -p 5000:5000 \
            -e SECRET_KEY=ci -e FLASK_ENV=production dsp:ci
          for i in $(seq 1 15); do
            curl -s http://localhost:5000/healthz && break
            echo "Waiting... ($i)"
            sleep 2
          done
          curl --fail http://localhost:5000/healthz
          docker logs dsp-smoke
          docker rm -f dsp-smoke
