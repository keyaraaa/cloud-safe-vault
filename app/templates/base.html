<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Vault — пароли и шифрование в одном месте">
    <title data-i18n="title.{% block page_key %}home{% endblock %}">Vault</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%236d8cff'/%3E%3Ctext x='50' y='68' font-family='Arial' font-size='58' font-weight='800' text-anchor='middle' fill='%230a0e1a'%3EV%3C/text%3E%3C/svg%3E">
</head>
<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <a class="brand" href="{{ url_for('index') }}">
                <span class="brand-mark">V</span>
                <span class="brand-text">Vault</span>
            </a>
            <nav class="nav">
                <a href="{{ url_for('index') }}" data-i18n="nav.home">Главная</a>
                <a href="{{ url_for('passwords_page') }}" data-i18n="nav.passwords">Пароли</a>
                <a href="{{ url_for('encryption_page') }}" data-i18n="nav.encryption">Шифрование</a>
                <a href="{{ url_for('about_page') }}" data-i18n="nav.about">О проекте</a>
            </nav>
            <button class="lang-switch" id="lang-toggle" aria-label="Language" title="RU / EN">
                <span id="lang-current">RU</span>
            </button>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>
                <span data-i18n="footer.line1">Vault · пет-проект, написанный в свободное время</span>
            </p>
            <p class="muted">
                <span data-i18n="footer.line2">Fernet · HIBP k-anonymity · Docker · PostgreSQL</span>
            </p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
