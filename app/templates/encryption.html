{% extends "base.html" %}
{% block page_key %}encryption{% endblock %}

{% block content %}
<header class="page-header">
    <h1 data-i18n="enc.heading">Шифрование текста</h1>
    <p class="lead" data-i18n="enc.lead">Для расшифровки нужны одновременно token_id и секретный ключ.</p>
</header>

<div class="tool-grid">
    <section class="tool-card" aria-labelledby="enc-title">
        <h2 id="enc-title" data-i18n="enc.box.title">Зашифровать</h2>
        <div class="field">
            <label for="enc-text" data-i18n="enc.box.label">Сообщение:</label>
            <textarea id="enc-text" rows="6" data-i18n-placeholder="enc.box.ph" placeholder="Введите текст для шифрования..."></textarea>
        </div>
        <button class="btn btn-primary" id="enc-run" data-i18n="enc.box.run">Зашифровать</button>

        <div class="result" id="enc-result" hidden>
            <p class="warning" data-i18n="enc.box.warn">⚠ Сохраните оба значения. Ключ показывается один раз.</p>
            <div class="field">
                <label data-i18n="enc.box.token">Token ID:</label>
                <div class="copy-row">
                    <code id="enc-token">—</code>
                    <button class="btn btn-ghost btn-small" data-copy="enc-token" data-i18n="enc.box.copy">Копировать</button>
                </div>
            </div>
            <div class="field">
                <label data-i18n="enc.box.key">Секретный ключ:</label>
                <div class="copy-row">
                    <code id="enc-key">—</code>
                    <button class="btn btn-ghost btn-small" data-copy="enc-key" data-i18n="enc.box.copy">Копировать</button>
                </div>
            </div>
            <p class="muted small"><span data-i18n="enc.box.expires">Срок действия:</span> <span id="enc-expires">—</span></p>
        </div>
    </section>

    <section class="tool-card" aria-labelledby="dec-title">
        <h2 id="dec-title" data-i18n="dec.title">Расшифровать</h2>
        <div class="field">
            <label for="dec-token" data-i18n="dec.token">Token ID:</label>
            <input type="text" id="dec-token" data-i18n-placeholder="dec.tokenPh" placeholder="вставьте token_id">
        </div>
        <div class="field">
            <label for="dec-key" data-i18n="dec.key">Секретный ключ:</label>
            <input type="text" id="dec-key" data-i18n-placeholder="dec.keyPh" placeholder="вставьте ключ">
        </div>
        <button class="btn btn-primary" id="dec-run" data-i18n="dec.run">Расшифровать</button>

        <div class="result" id="dec-result" hidden>
            <label data-i18n="dec.result">Расшифрованный текст:</label>
            <pre id="dec-plaintext" class="plaintext-output">—</pre>
        </div>
    </section>
</div>
{% endblock %}
