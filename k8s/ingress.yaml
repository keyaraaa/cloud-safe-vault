apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dsp-ingress
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dsp.example.com
      secretName: dsp-tls
  rules:
    - host: dsp.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dsp-web
                port:
                  number: 80
