apiVersion: apps/v1
kind: Deployment
metadata:
  name: dsp-web
  labels:
    app: dsp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dsp
  template:
    metadata:
      labels:
        app: dsp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: dsp-web
          image: ghcr.io/your-org/dsp:latest   # замените на ваш registry
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          envFrom:
            - secretRef:
                name: dsp-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 30
